<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Budget — Southern</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet">
<style>
:root {
  --bg: #080808;
  --surface: #101010;
  --surface2: #161616;
  --border: #1a1a1a;
  --border2: #252525;
  --green: #00e87a;
  --green-dim: rgba(0,232,122,0.07);
  --red: #ff3d55;
  --red-dim: rgba(255,61,85,0.07);
  --gold: #f0c040;
  --gold-dim: rgba(240,192,64,0.08);
  --blue: #4d9fff;
  --text: #efefef;
  --muted: #444;
  --muted2: #777;
  --mono: 'DM Mono', monospace;
  --display: 'Syne', sans-serif;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh;font-size:14px}
header{display:flex;align-items:center;justify-content:space-between;padding:22px 32px;border-bottom:1px solid var(--border);position:sticky;top:0;background:rgba(8,8,8,0.95);backdrop-filter:blur(16px);z-index:200;}
.logo{font-family:var(--display);font-weight:800;font-size:1.05rem;letter-spacing:.05em}
.logo em{color:var(--green);font-style:normal}
.header-month{font-size:.7rem;color:var(--muted2);letter-spacing:.1em;text-transform:uppercase}
.month-tabs-wrap{border-bottom:1px solid var(--border);background:var(--surface);position:sticky;top:61px;z-index:100;overflow-x:auto;}
.month-tabs-wrap::-webkit-scrollbar{height:3px}
.month-tabs-wrap::-webkit-scrollbar-thumb{background:var(--border2)}
.month-tabs{display:flex;padding:0 20px;min-width:max-content}
.month-tab{font-family:var(--display);font-weight:600;font-size:.72rem;letter-spacing:.08em;text-transform:uppercase;padding:14px 18px;border:none;background:none;color:var(--muted2);cursor:pointer;border-bottom:2px solid transparent;transition:color .15s,border-color .15s;white-space:nowrap;position:relative;}
.month-tab:hover{color:var(--text)}
.month-tab.active{color:var(--text);border-bottom-color:var(--green)}
.month-tab .rdot{position:absolute;top:10px;right:6px;width:5px;height:5px;border-radius:50%;background:var(--blue);opacity:.7;}
.btn-add-month{background:none;border:none;color:var(--muted);cursor:pointer;font-size:1.1rem;padding:0 14px;transition:color .15s;line-height:1;}
.btn-add-month:hover{color:var(--green)}
.summary{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;border-bottom:1px solid var(--border)}
.s-card{padding:22px 26px;border-right:1px solid var(--border);position:relative;overflow:hidden}
.s-card:last-child{border-right:none}
.s-card::after{content:'';position:absolute;bottom:0;left:0;width:100%;height:2px}
.s-card.in::after{background:var(--green)}
.s-card.out::after{background:var(--red)}
.s-card.net::after{background:var(--gold)}
.s-card.assets::after{background:var(--blue)}
.s-label{font-size:.62rem;letter-spacing:.14em;text-transform:uppercase;color:var(--muted2);margin-bottom:8px}
.s-value{font-family:var(--display);font-weight:800;font-size:1.7rem;letter-spacing:-.02em;line-height:1}
.s-card.in .s-value{color:var(--green)}
.s-card.out .s-value{color:var(--red)}
.s-card.assets .s-value{color:var(--blue)}
.s-sub{font-size:.62rem;color:var(--muted2);margin-top:5px;letter-spacing:.04em}
.net-pos{color:var(--gold)}
.net-neg{color:var(--red)}
.main{display:grid;grid-template-columns:1fr 1fr;border-bottom:1px solid var(--border)}
.panel{padding:22px 26px;border-right:1px solid var(--border)}
.panel:last-child{border-right:none}
.panel-title{font-family:var(--display);font-weight:700;font-size:.76rem;letter-spacing:.08em;text-transform:uppercase;display:flex;align-items:center;gap:7px;margin-bottom:16px;}
.dot{width:7px;height:7px;border-radius:50%;display:inline-block;flex-shrink:0}
.dot-green{background:var(--green)}
.dot-red{background:var(--red)}
.dot-gold{background:var(--gold)}
.dot-blue{background:var(--blue)}
.form-row{display:grid;gap:7px;margin-bottom:8px;align-items:start}
.form-row-income{grid-template-columns:1fr 110px auto}
.form-row-expense{grid-template-columns:1fr 110px auto auto}
input[type=text],input[type=number]{background:var(--surface2);border:1px solid var(--border2);color:var(--text);font-family:var(--mono);font-size:.78rem;padding:9px 11px;border-radius:4px;outline:none;transition:border-color .15s;width:100%;}
input::placeholder{color:var(--muted)}
input:focus{border-color:var(--muted2)}
.btn{border:none;font-family:var(--display);font-weight:600;font-size:.72rem;letter-spacing:.05em;padding:9px 14px;border-radius:4px;cursor:pointer;white-space:nowrap;transition:opacity .15s,transform .1s;line-height:1;}
.btn:active{transform:scale(.97)}
.btn:hover{opacity:.85}
.btn-green{background:var(--green);color:#000}
.btn-red{background:var(--red);color:#fff}
.btn-ghost{background:var(--surface2);border:1px solid var(--border2);color:var(--muted2)}
.btn-ghost:hover{color:var(--text);border-color:var(--muted2)}
.recurr-toggle{display:flex;align-items:center;gap:5px;font-size:.67rem;color:var(--muted2);cursor:pointer;user-select:none;padding:9px 10px;background:var(--surface2);border:1px solid var(--border2);border-radius:4px;transition:all .15s;white-space:nowrap;}
.recurr-toggle input{accent-color:var(--blue);cursor:pointer;width:12px;height:12px;flex-shrink:0}
.recurr-toggle.on{color:var(--blue);border-color:rgba(77,159,255,.3);background:rgba(77,159,255,.07)}
.tx-list{margin-top:10px;display:flex;flex-direction:column;gap:5px;max-height:280px;overflow-y:auto;padding-right:2px;}
.tx-list::-webkit-scrollbar{width:3px}
.tx-list::-webkit-scrollbar-thumb{background:var(--border2);border-radius:3px}
.tx-item{display:flex;align-items:center;justify-content:space-between;padding:9px 11px;border-radius:4px;border:1px solid transparent;animation:slideIn .18s ease;gap:8px;}
.tx-item.income{background:var(--green-dim);border-color:rgba(0,232,122,.12)}
.tx-item.expense{background:var(--red-dim);border-color:rgba(255,61,85,.12)}
.tx-item.expense.rec{border-color:rgba(77,159,255,.2);background:rgba(77,159,255,.04)}
.tx-left{flex:1;min-width:0}
.tx-name{font-size:.78rem;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.tx-meta{display:flex;align-items:center;gap:6px;margin-top:2px}
.tx-date{font-size:.62rem;color:var(--muted2);letter-spacing:.04em}
.tx-badge{font-size:.58rem;letter-spacing:.07em;text-transform:uppercase;padding:1px 6px;border-radius:3px;font-weight:500}
.badge-rec{background:rgba(77,159,255,.15);color:var(--blue)}
.tx-amount{font-family:var(--display);font-weight:700;font-size:.88rem;white-space:nowrap}
.tx-item.income .tx-amount{color:var(--green)}
.tx-item.expense .tx-amount{color:var(--red)}
.tx-item.expense.rec .tx-amount{color:var(--blue)}
.tx-delete{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;padding:2px 4px;border-radius:3px;transition:color .15s;line-height:1;flex-shrink:0;}
.tx-delete:hover{color:var(--red)}
.empty{font-size:.68rem;color:var(--muted);text-align:center;padding:18px 0;letter-spacing:.06em}
.recurr-section{padding:22px 26px;border-bottom:1px solid var(--border)}
.recurr-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.recurr-sub{font-size:.63rem;color:var(--muted2);letter-spacing:.05em}
.recurr-list{display:flex;flex-direction:column;gap:5px}
.recurr-item{display:flex;align-items:center;justify-content:space-between;padding:9px 12px;border-radius:4px;background:rgba(77,159,255,.05);border:1px solid rgba(77,159,255,.15);gap:8px;animation:slideIn .18s ease;}
.recurr-name{font-size:.78rem;flex:1}
.recurr-amt{font-family:var(--display);font-weight:700;font-size:.88rem;color:var(--blue)}
.recurr-del{background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;padding:2px 4px;transition:color .15s}
.recurr-del:hover{color:var(--red)}
.accounts-section{padding:22px 26px;border-bottom:1px solid var(--border)}
.accounts-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.total-assets{font-family:var(--display);font-weight:700;font-size:.8rem;color:var(--muted2)}
.total-assets span{color:var(--blue)}
.accounts-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:9px;margin-bottom:12px}
.acct-card{background:var(--surface2);border:1px solid var(--border2);border-radius:6px;padding:13px;position:relative;animation:slideIn .18s ease;transition:border-color .15s;}
.acct-card:hover{border-color:var(--muted)}
.acct-name{font-size:.63rem;color:var(--muted2);letter-spacing:.09em;text-transform:uppercase;margin-bottom:5px}
.acct-bal{font-family:var(--display);font-weight:800;font-size:1.25rem;letter-spacing:-.01em;color:var(--gold);cursor:pointer;border-bottom:1px dashed transparent;transition:border-color .15s;display:inline-block;}
.acct-bal:hover{border-color:var(--gold)}
.acct-bal-input{font-family:var(--display);font-weight:800;font-size:1.1rem;color:var(--gold);background:transparent;border:none;border-bottom:1px solid var(--gold);padding:2px 0;width:100%;outline:none;}
.acct-del{position:absolute;top:8px;right:8px;background:none;border:none;color:var(--muted);cursor:pointer;font-size:.75rem;transition:color .15s}
.acct-del:hover{color:var(--red)}
.add-acct-row{display:grid;grid-template-columns:1fr 150px auto;gap:7px;align-items:center}
footer{padding:16px 26px;display:flex;justify-content:space-between;align-items:center}
.footer-note{font-size:.62rem;color:var(--muted);letter-spacing:.05em}
.footer-actions{display:flex;gap:8px}
@keyframes slideIn{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
@media(max-width:740px){
  header{padding:14px 16px}
  .summary{grid-template-columns:1fr 1fr}
  .s-card:nth-child(2){border-right:none}
  .s-card:nth-child(3){border-top:1px solid var(--border)}
  .main{grid-template-columns:1fr}
  .panel{border-right:none;border-bottom:1px solid var(--border);padding:16px}
  .accounts-section,.recurr-section{padding:16px}
  .form-row-income,.form-row-expense{grid-template-columns:1fr 100px}
  .form-row-income .btn-green,.form-row-expense .btn-red{grid-column:1/-1}
  .form-row-expense .recurr-toggle{grid-column:1/-1}
  .add-acct-row{grid-template-columns:1fr 1fr}
  .add-acct-row .btn-green{grid-column:1/-1}
  footer{flex-direction:column;gap:8px;text-align:center;padding:12px 16px}
  .s-value{font-size:1.3rem}
}
</style>
</head>
<body>

<header>
  <div class="logo">BUDGET<em>.</em></div>
  <div class="header-month" id="headerMonth"></div>
</header>

<div class="month-tabs-wrap">
  <div class="month-tabs" id="monthTabs">
    <button class="btn-add-month" onclick="addNewMonth()" title="Add next month">＋</button>
  </div>
</div>

<div class="summary">
  <div class="s-card in"><div class="s-label">Money In</div><div class="s-value" id="sumIn">$0</div><div class="s-sub" id="sumInSub"></div></div>
  <div class="s-card out"><div class="s-label">Money Out</div><div class="s-value" id="sumOut">$0</div><div class="s-sub" id="sumOutSub"></div></div>
  <div class="s-card net"><div class="s-label">Net</div><div class="s-value" id="sumNet">$0</div><div class="s-sub" id="sumNetSub"></div></div>
  <div class="s-card assets"><div class="s-label">Total Assets</div><div class="s-value" id="sumAssets">$0</div><div class="s-sub">across all accounts</div></div>
</div>

<div class="main">
  <div class="panel">
    <div class="panel-title"><span class="dot dot-green"></span>Income</div>
    <div class="form-row form-row-income">
      <input type="text" id="incDesc" placeholder="e.g. Client payment, salary">
      <input type="number" id="incAmt" placeholder="Amount" step="0.01" min="0">
      <button class="btn btn-green" onclick="addTx('income')">+ Add</button>
    </div>
    <div class="tx-list" id="incomeList"></div>
  </div>
  <div class="panel">
    <div class="panel-title"><span class="dot dot-red"></span>Expenses</div>
    <div class="form-row form-row-expense">
      <input type="text" id="expDesc" placeholder="e.g. Mortgage, Netflix, gas">
      <input type="number" id="expAmt" placeholder="Amount" step="0.01" min="0">
      <label class="recurr-toggle" id="recurrLabel"><input type="checkbox" id="recurrCheck"> Recurring</label>
      <button class="btn btn-red" onclick="addTx('expense')">+ Add</button>
    </div>
    <div class="tx-list" id="expenseList"></div>
  </div>
</div>

<div class="recurr-section">
  <div class="recurr-head">
    <div class="panel-title" style="margin-bottom:0"><span class="dot dot-blue"></span>Monthly Recurring Expenses</div>
    <div class="recurr-sub">Auto-loaded into every new month</div>
  </div>
  <div class="recurr-list" id="recurrList"></div>
</div>

<div class="accounts-section">
  <div class="accounts-head">
    <div class="panel-title" style="margin-bottom:0"><span class="dot dot-gold"></span>Accounts &amp; Balances</div>
    <div class="total-assets">Total Assets: <span id="totalAssets">$0</span></div>
  </div>
  <div class="accounts-grid" id="accountsGrid"></div>
  <div class="add-acct-row">
    <input type="text" id="acctName" placeholder="Account name (e.g. Chase Checking)">
    <input type="number" id="acctBal" placeholder="Balance" step="0.01">
    <button class="btn btn-green" onclick="addAccount()">+ Add Account</button>
  </div>
</div>

<footer>
  <div class="footer-note">Data saved locally. Bookmark this page — it persists across visits.</div>
  <div class="footer-actions">
    <button class="btn btn-ghost" onclick="clearMonth()">Clear Month</button>
    <button class="btn btn-ghost" style="color:var(--red);border-color:rgba(255,61,85,.3)" onclick="clearAll()">Reset All</button>
  </div>
</footer>

<script>
const STORE='budget_v2';
function defState(){const key=mKey(new Date());return{activeMonth:key,months:{[key]:emptyMonth()},accounts:[],recurring:[]};}
function emptyMonth(){return{income:[],expenses:[]};}
function mKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0');}
function mLabel(k){const[y,m]=k.split('-');return new Date(y,m-1,1).toLocaleDateString('en-US',{month:'short',year:'numeric'}).toUpperCase();}
function load(){try{return JSON.parse(localStorage.getItem(STORE))||defState();}catch{return defState();}}
function save(){localStorage.setItem(STORE,JSON.stringify(state));}
let state=load();
if(!state.recurring)state.recurring=[];
if(!state.accounts)state.accounts=[];

function ensureMonth(key){
  if(!state.months[key]){
    state.months[key]=emptyMonth();
    state.recurring.forEach(r=>{state.months[key].expenses.push({id:uid(),desc:r.desc,amt:r.amt,recurring:true,date:Date.now()});});
  }
}
function switchMonth(key){ensureMonth(key);state.activeMonth=key;save();render();setTimeout(()=>{const t=document.querySelector(`.month-tab[data-key="${key}"]`);if(t)t.scrollIntoView({inline:'nearest',behavior:'smooth'});},50);}
function addNewMonth(){const keys=Object.keys(state.months).sort();const last=keys[keys.length-1];const[y,m]=last.split('-').map(Number);const next=new Date(y,m,1);const key=mKey(next);ensureMonth(key);state.activeMonth=key;save();render();setTimeout(()=>{const t=document.querySelector(`.month-tab[data-key="${key}"]`);if(t)t.scrollIntoView({inline:'nearest',behavior:'smooth'});},80);}

function addTx(type){
  const dEl=document.getElementById(type==='income'?'incDesc':'expDesc');
  const aEl=document.getElementById(type==='income'?'incAmt':'expAmt');
  const desc=dEl.value.trim();const amt=parseFloat(aEl.value);
  if(!desc||isNaN(amt)||amt<=0){shake(aEl);return;}
  const isRec=type==='expense'&&document.getElementById('recurrCheck').checked;
  const tx={id:uid(),desc,amt,date:Date.now(),recurring:isRec};
  const mo=state.months[state.activeMonth];
  if(type==='income')mo.income.push(tx);else mo.expenses.push(tx);
  if(isRec){const already=state.recurring.some(r=>r.desc.toLowerCase()===desc.toLowerCase());if(!already)state.recurring.push({id:uid(),desc,amt});document.getElementById('recurrCheck').checked=false;updateRecurrLabel();}
  dEl.value='';aEl.value='';save();render();
}
function deleteTx(type,id){const mo=state.months[state.activeMonth];if(type==='income')mo.income=mo.income.filter(t=>t.id!==id);else mo.expenses=mo.expenses.filter(t=>t.id!==id);save();render();}
function deleteRecurring(id){state.recurring=state.recurring.filter(r=>r.id!==id);save();render();}
function addAccount(){const nEl=document.getElementById('acctName');const bEl=document.getElementById('acctBal');const name=nEl.value.trim();const bal=parseFloat(bEl.value);if(!name||isNaN(bal)){shake(nEl);return;}state.accounts.push({id:uid(),name,bal});nEl.value='';bEl.value='';save();render();}
function deleteAccount(id){state.accounts=state.accounts.filter(a=>a.id!==id);save();render();}
function editBalance(id){
  const card=document.querySelector(`[data-acct="${id}"]`);if(!card)return;
  const acct=state.accounts.find(a=>a.id===id);if(!acct)return;
  const disp=card.querySelector('.acct-bal');
  const inp=document.createElement('input');inp.className='acct-bal-input';inp.type='number';inp.value=acct.bal;inp.step='0.01';
  function commit(){const v=parseFloat(inp.value);if(!isNaN(v)){acct.bal=v;save();}render();}
  inp.addEventListener('blur',commit);inp.addEventListener('keydown',e=>{if(e.key==='Enter')inp.blur();if(e.key==='Escape')render();});
  disp.replaceWith(inp);inp.focus();inp.select();
}

function render(){renderTabs();renderSummary();renderLists();renderRecurringSection();renderAccounts();document.getElementById('headerMonth').textContent=mLabel(state.activeMonth);}
function renderTabs(){
  const tabs=document.getElementById('monthTabs');const addBtn=tabs.querySelector('.btn-add-month');
  [...tabs.querySelectorAll('.month-tab')].forEach(t=>t.remove());
  ensureMonth(mKey(new Date()));
  Object.keys(state.months).sort().forEach(key=>{
    const mo=state.months[key];const hasRec=mo.expenses.some(e=>e.recurring);
    const btn=document.createElement('button');btn.className='month-tab'+(key===state.activeMonth?' active':'');btn.dataset.key=key;btn.onclick=()=>switchMonth(key);
    btn.innerHTML=mLabel(key)+(hasRec?'<span class="rdot"></span>':'');tabs.insertBefore(btn,addBtn);
  });
}
function renderSummary(){
  const mo=state.months[state.activeMonth];
  const totalIn=mo.income.reduce((s,t)=>s+t.amt,0);const totalOut=mo.expenses.reduce((s,t)=>s+t.amt,0);const net=totalIn-totalOut;
  const assets=state.accounts.reduce((s,a)=>s+a.bal,0);const recAmt=mo.expenses.filter(e=>e.recurring).reduce((s,e)=>s+e.amt,0);const recCnt=mo.expenses.filter(e=>e.recurring).length;
  document.getElementById('sumIn').textContent=fmt(totalIn);document.getElementById('sumInSub').textContent=mo.income.length+' entr'+(mo.income.length===1?'y':'ies');
  document.getElementById('sumOut').textContent=fmt(totalOut);document.getElementById('sumOutSub').textContent=recCnt?fmt(recAmt)+' recurring':'';
  const netEl=document.getElementById('sumNet');netEl.textContent=(net<0?'-':'')+fmt(net);netEl.className='s-value '+(net<0?'net-neg':'net-pos');
  document.getElementById('sumNetSub').textContent=net>=0?'surplus':'deficit';document.getElementById('sumAssets').textContent=fmt(assets);document.getElementById('totalAssets').textContent=fmt(assets);
}
function renderLists(){const mo=state.months[state.activeMonth];renderTxList('incomeList',mo.income,'income');renderTxList('expenseList',mo.expenses,'expense');}
function renderTxList(elId,items,type){
  const el=document.getElementById(elId);
  if(!items.length){el.innerHTML='<div class="empty">No entries this month.</div>';return;}
  el.innerHTML=items.slice().reverse().map(t=>`<div class="tx-item ${type}${t.recurring?' rec':''}"><div class="tx-left"><div class="tx-name">${esc(t.desc)}</div><div class="tx-meta"><span class="tx-date">${new Date(t.date).toLocaleDateString('en-US',{month:'short',day:'numeric'})}</span>${t.recurring?'<span class="tx-badge badge-rec">recurring</span>':''}</div></div><div class="tx-amount">${type==='income'?'+':'-'}${fmt(t.amt)}</div><button class="tx-delete" onclick="deleteTx('${type}','${t.id}')">✕</button></div>`).join('');
}
function renderRecurringSection(){
  const el=document.getElementById('recurrList');
  if(!state.recurring.length){el.innerHTML='<div class="empty">None set yet. Check "Recurring" when adding an expense.</div>';return;}
  el.innerHTML=state.recurring.map(r=>`<div class="recurr-item"><div class="recurr-name">${esc(r.desc)}</div><div class="recurr-amt">-${fmt(r.amt)}/mo</div><button class="recurr-del" onclick="deleteRecurring('${r.id}')">✕</button></div>`).join('');
}
function renderAccounts(){
  const grid=document.getElementById('accountsGrid');
  if(!state.accounts.length){grid.innerHTML='<div class="empty" style="grid-column:1/-1">No accounts added yet.</div>';return;}
  grid.innerHTML=state.accounts.map(a=>`<div class="acct-card" data-acct="${a.id}"><div class="acct-name">${esc(a.name)}</div><div class="acct-bal" onclick="editBalance('${a.id}')" title="Click to update">${fmt(a.bal)}</div><button class="acct-del" onclick="deleteAccount('${a.id}')">✕</button></div>`).join('');
}

function fmt(n){return'$'+Math.abs(n).toLocaleString('en-US',{minimumFractionDigits:2,maximumFractionDigits:2});}
function uid(){return Date.now().toString(36)+Math.random().toString(36).slice(2);}
function esc(s){return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');}
function shake(el){el.style.borderColor='var(--red)';setTimeout(()=>{el.style.borderColor='';},700);}
function updateRecurrLabel(){const on=document.getElementById('recurrCheck').checked;document.getElementById('recurrLabel').className='recurr-toggle'+(on?' on':'');}
document.getElementById('recurrCheck').addEventListener('change',updateRecurrLabel);
document.getElementById('incAmt').addEventListener('keydown',e=>{if(e.key==='Enter')addTx('income');});
document.getElementById('expAmt').addEventListener('keydown',e=>{if(e.key==='Enter')addTx('expense');});
document.getElementById('acctBal').addEventListener('keydown',e=>{if(e.key==='Enter')addAccount();});
function clearMonth(){if(!confirm('Clear all transactions for '+mLabel(state.activeMonth)+'?\nRecurring entries stay in the master list.'))return;state.months[state.activeMonth]=emptyMonth();save();render();}
function clearAll(){if(!confirm('Delete EVERYTHING?'))return;localStorage.removeItem(STORE);state=defState();save();render();}

ensureMonth(mKey(new Date()));
if(!state.activeMonth||!state.months[state.activeMonth])state.activeMonth=mKey(new Date());
save();render();
setTimeout(()=>{const active=document.querySelector('.month-tab.active');if(active)active.scrollIntoView({inline:'center',behavior:'smooth'});},100);
</script>
</body>
</html>
